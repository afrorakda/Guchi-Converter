<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guchi-Converter | AIがあなたの理性を代行します</title>
    <style>
        /* 前回のスタイルを継承しつつ、隠し扉を追加 */
        body { font-family: sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 400px; text-align: center; position: relative; }
        h1 { color: #007bff; margin-bottom: 5px; }
        .subtitle { font-size: 0.9rem; color: #666; margin-bottom: 25px; }
        textarea { width: 100%; height: 150px; padding: 15px; border: 2px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; resize: none; }
        button { width: 100%; padding: 16px; background-color: #007bff; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #output-area { width: 100%; min-height: 120px; padding: 20px; background-color: #fff; border-left: 6px solid #28a745; border-radius: 8px; text-align: left; margin-top: 20px; display: none; }

        /* 隠し扉：右下のドット */
        .secret-gate {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            opacity: 0.1; /* ほとんど見えない */
        }
        
        /* 設定モーダル */
        #settings-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            z-index: 100;
            width: 80%;
            max-width: 300px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Guchi-Converter</h1>
    <p class="subtitle">AIがあなたの理性を代行します</p>
    <textarea id="input-text" placeholder="ここに愚痴を入力..."></textarea>
    <button onclick="convertGuchi()">プロの報告書に変換</button>
    <div id="output-area"></div>
</div>

<div class="secret-gate" onclick="toggleSettings()">.</div>

<div id="settings-modal">
    <h3>Settings</h3>
    <input type="password" id="api-key-input" placeholder="OpenAI API Key" style="width:100%; padding:10px; margin-bottom:10px;">
    <button onclick="saveSettings()" style="background:#333;">Save Key</button>
</div>

<script>
    // キーを保存・取得
    function saveSettings() {
        const key = document.getElementById('api-key-input').value;
        localStorage.setItem('guchi_api_key', key);
        alert('Key Saved!');
        toggleSettings();
    }

    function toggleSettings() {
        const modal = document.getElementById('settings-modal');
        modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
    }

    async function convertGuchi() {
        const key = localStorage.getItem('guchi_api_key');
        if (!key) {
            alert('右下の「.」からAPIキーを設定してください');
            return;
        }
        // ここに将来的にAPI呼び出しコードを書きます
        const output = document.getElementById('output-area');
        output.style.display = 'block';
        output.innerText = "キーは設定されています。次は本物のAIと繋ぎましょう！";
    }
</script>

</body>
</html>
